[build-system]
requires = ["maturin>=1.8,<2.0"]
build-backend = "maturin"

[project]
name = "blazeweb"
version = "2.0.0a0"
description = "Fast URL → fully-rendered HTML + optional screenshot for Python, powered by Chromium via CDP"
requires-python = ">=3.11"
dependencies = [
    "pydantic>=2.0",
    "pydantic-settings>=2.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=8",
    "pytest-httpserver>=1.1",
]
bench = [
    "pytest>=8",
    "playwright>=1.49",
]

[tool.maturin]
python-source = "python"
module-name = "blazeweb._blazeweb"
features = ["pyo3/extension-module"]
include = [
    { path = "python/blazeweb/_binaries/**/*", format = "wheel" },
]

[tool.pytest.ini_options]
testpaths = ["tests"]
markers = [
    "benchmark: performance regression tests",
    "real_sites: gauntlet tests against real production websites",
    "threading: multi-thread / concurrency tests",
]
